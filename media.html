<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Talvaren Media</title>

<link rel="icon" type="image/png" href="images/Logo-min.PNG">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="wallpaper"></div>

<header class="site-header">

    <img
        src="images/Talvaren_Banner.PNG"
        alt="Talvaren Studios"
        class="banner">

</header>

<main class="page">

    <h1 class="page-title">
        Talvaren Media
    </h1>

    <p class="page-intro">
        Every vision preserved within these archives marks another step in
        Talvaren's journey. Gameplay footage, world exploration, and
        captured moments are recorded here as the world continues to grow.
    </p>

    <div class="media-viewer">

        <section class="document">

            <div id="heroContent"></div>

            <img
                id="heroMirror"
                src="images/Talvaren_Mirror.PNG"
                alt="Talvaren viewing mirror"
                class="document-image">

        </section>

    </div>

    <section class="document">

        <h2>
            Moving Visions
        </h2>

        <div class="media-row">

            <button
                class="media-arrow"
                type="button"
                aria-label="Previous videos">
                ←
            </button>

            <button
                class="media-card"
                type="button"
                data-media-type="video"
                data-video-id="Y4BLEG5Ce8Y">

                <img
                    src="https://img.youtube.com/vi/Y4BLEG5Ce8Y/hqdefault.jpg"
                    alt="First Journey video thumbnail">

                <h3>
                    First Journey
                </h3>

                <p>
                    The first recorded voyage into Talvaren. An ox cart
                    crosses the great bridge and enters the village,
                    preserving one of the earliest moments in the world's
                    development.
                </p>

            </button>

            <button
                class="media-card"
                type="button"
                data-media-type="placeholder">

                <img
                    src="images/Logo-min.PNG"
                    alt="More Talvaren videos to come">

                <h3>
                    More to Come
                </h3>

                <p>
                    Additional gameplay demonstrations and development
                    updates will appear here.
                </p>

            </button>

            <button
                class="media-card"
                type="button"
                data-media-type="placeholder">

                <img
                    src="images/Logo-min.PNG"
                    alt="More Talvaren videos to come">

                <h3>
                    More to Come
                </h3>

                <p>
                    New adventures and future recordings will be preserved
                    within these archives.
                </p>

            </button>

            <button
                class="media-arrow"
                type="button"
                aria-label="Next videos">
                →
            </button>

        </div>

    </section>

    <section class="document">

        <h2>
            Captured Visions
        </h2>

        <div class="media-row">

            <button
                class="media-arrow"
                type="button"
                aria-label="Previous images">
                ←
            </button>

            <button
                class="media-card"
                type="button"
                data-media-type="placeholder">

                <img
                    src="images/Logo-min.PNG"
                    alt="More Talvaren images to come">

                <h3>
                    More to Come
                </h3>

                <p>
                    The first archived screenshots will appear here as
                    Talvaren continues to evolve.
                </p>

            </button>

            <button
                class="media-card"
                type="button"
                data-media-type="placeholder">

                <img
                    src="images/Logo-min.PNG"
                    alt="More Talvaren images to come">

                <h3>
                    More to Come
                </h3>

                <p>
                    Additional landscapes, settlements, and discoveries
                    will be added to the archives.
                </p>

            </button>

            <button
                class="media-card"
                type="button"
                data-media-type="placeholder">

                <img
                    src="images/Logo-min.PNG"
                    alt="More Talvaren images to come">

                <h3>
                    More to Come
                </h3>

                <p>
                    More visions await as the world of Talvaren grows.
                </p>

            </button>

            <button
                class="media-arrow"
                type="button"
                aria-label="Next images">
                →
            </button>

        </div>

    </section>

    <p style="margin-top:50px;text-align:center;">

        <a
            href="talvaren.html"
            style="color:#e6e6e6;">

            ← Return to Talvaren

        </a>

    </p>

</main>

<footer>

    © 2026 Talvaren Studios

</footer>

<script src="js/media.js"></script>

</body>

</html>
