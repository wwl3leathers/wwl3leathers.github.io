<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Talvaren Document Viewer</title>

<link rel="icon" type="image/png" href="images/Logo-min.PNG">
<link rel="stylesheet" href="viewer.css">

</head>

<body>

<div class="viewer-background"></div>

<div class="viewer">

    <header class="viewer-header">

        <button id="prevBtn">
            ← Previous
        </button>

        <h1 id="imageTitle">
            Loading Document...
        </h1>

        <button id="nextBtn">
            Next →
        </button>

    </header>

    <main class="viewer-main">

        <img
            id="viewerImage"
            src=""
            alt="Talvaren Document">

    </main>

    <footer class="viewer-footer">

        <button id="closeBtn">
            Return to Archives
        </button>

    </footer>

</div>

<script src="artwork.js"></script>
<script src="viewer.js"></script>

</body>

</html>
