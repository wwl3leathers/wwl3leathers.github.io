<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talvaren Studios</title>
    <link rel="icon" type="image/jpeg" href="images/Logo-min.jpg">
    <style>
        body {
            margin: 0;
            font-family: 'Times New Roman', serif;
            color: #D9C9A6; /* beige lettering */
            background-color: #000;
        }

        header {
            position: relative;
            width: 100%;
            height: 600px; /* adjust to taste */
            background: url('Talvaren_Wallpaper.jpg') center center/cover no-repeat;
        }

        /* Stylized site title */
        .site-title {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            font-family: 'Cinzel', serif; /* example medieval style, adjust if desired */
            color: #D9C9A6;
            text-shadow: 2px 2px 5px #000;
        }

        /* Hamburger menu */
        .hamburger {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            cursor: pointer;
            color: #D9C9A6;
            z-index: 10;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .site-title {
                font-size: 2.5rem;
            }
            .hamburger {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="hamburger">&#9776;</div>
        <h1 class="site-title">Talvaren Studios</h1>
    </header>

    <!-- Rest of your page content remains unchanged -->
</body>
</html>
